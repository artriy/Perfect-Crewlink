name: Release

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to attach assets to
        required: false
        type: string
  release:
    types: [published]

jobs:
  build-release:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: BetterCrewLink Windows Release Assets
            upload_glob: |
              src-tauri/target/release/bettercrewlink.exe
              src-tauri/target/release/bundle/nsis/*.exe
          - os: ubuntu-22.04
            artifact_name: BetterCrewLink Linux Release Assets
            upload_glob: src-tauri/target/release/bundle/appimage/*.AppImage

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build desktop app
        run: npm run tauri -- build

      - name: Upload workflow artifacts
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.upload_glob }}
          if-no-files-found: error

      - name: Attach release files
        if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
          files: ${{ matrix.upload_glob }}
          fail_on_unmatched_files: true
          overwrite_files: true
