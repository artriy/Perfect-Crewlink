name: Release

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to attach assets to
        required: false
        type: string
  release:
    types: [published]

jobs:
  build-release:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      RELEASE_ARTIFACTS: |
        src-tauri/target/release/perfectcrewlink.exe
        src-tauri/target/release/bundle/nsis/*.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build desktop app
        run: npm run tauri -- build

      - name: Upload workflow artifacts
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: Perfect Crewlink Windows Release Assets
          path: ${{ env.RELEASE_ARTIFACTS }}
          if-no-files-found: error

      - name: Attach release files
        if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}
          files: ${{ env.RELEASE_ARTIFACTS }}
          fail_on_unmatched_files: true
          overwrite_files: true
